<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lộc vi tính - Fix Printer PC</title>
    <style>
        :root {
            --text-color: #ffffff;
            --text-shadow: 0px 2px 5px rgba(0, 0, 0, 0.9);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
        }

        /* Hình nền */
        .desktop-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* Lưới Icon Desktop */
        .desktop-icons {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            grid-template-rows: repeat(auto-fill, 120px);
            gap: 10px;
            padding: 20px;
            height: calc(100vh - 50px);
            align-content: start;
            box-sizing: border-box;
        }

        .icon {
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-color); cursor: pointer; padding: 10px;
            border-radius: 8px; transition: 0.2s; text-decoration: none;
            position: relative;
        }

        .icon:hover {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        /* Kích thước Icon Thư mục */
        .icon img {
            width: 55px; /* Tăng nhẹ kích thước cho dễ nhìn */
            height: auto;
            margin-bottom: 8px;
            filter: drop-shadow(0px 4px 5px rgba(0,0,0,0.4));
        }

        .icon span {
            font-size: 13px; text-shadow: var(--text-shadow);
            text-align: center; font-weight: 500;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Nút xóa icon */
        .delete-btn {
            position: absolute; top: 2px; right: 15px;
            background: rgba(255, 50, 50, 0.9); color: white;
            border: none; border-radius: 50%; width: 20px; height: 20px;
            font-size: 12px; cursor: pointer; display: none; z-index: 10;
        }

        .icon:hover .delete-btn { display: block; }

        /* Taskbar */
        .taskbar {
            position: fixed; bottom: 0; width: 100%; height: 48px;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px);
            display: flex; align-items: center; padding: 0 20px;
            box-sizing: border-box; z-index: 100;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .lock-badge {
            position: absolute;
            top: 5px;
            right: 15px; /* Điều chỉnh lại để nó nằm trên góc icon */
            font-size: 14px; /* Tăng kích cỡ ổ khóa cho dễ nhìn */
            z-index: 5;
        }
        .taskbar-time { margin-left: auto; color: white; font-size: 12px; text-align: right; line-height: 1.3; }
    </style>
</head>
<body>

    <div class="desktop-background"></div>

    <div class="desktop-icons" id="desktopIcons">
        <div class="icon" onclick="addNewIcon()" id="addBtn">
            <img src="https://cdn-icons-png.flaticon.com/512/10543/10543160.png" alt="Add">
            <span>Thêm Shortcut</span>
        </div>
    </div>

    <div class="taskbar">
        <div style="color: white; font-weight: bold; font-size: 14px;">PHẦN MỀM TỰ LÀM</div>
        <div id="clock" class="taskbar-time"></div>
    </div>

    <script>
        // Icon Folder chuẩn (màu vàng chuyên nghiệp)
        const FOLDER_ICON = "https://cdn-icons-png.flaticon.com/512/3767/3767084.png";

        let shortcuts = JSON.parse(localStorage.getItem('yenloc_data')) || [];

        function saveAndRender() {
            localStorage.setItem('yenloc_data', JSON.stringify(shortcuts));
            renderIcons();
        }

        function renderIcons() {
            const container = document.getElementById('desktopIcons');
            const addBtn = document.getElementById('addBtn');
            
            // Dọn dẹp icon cũ
            const oldIcons = container.querySelectorAll('.dynamic-icon');
            oldIcons.forEach(icon => icon.remove());

            // Render từ danh sách lưu trữ
            shortcuts.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'icon dynamic-icon';
                // ĐOẠN QUAN TRỌNG: Kiểm tra nếu có password thì mới tạo thẻ lock-badge
                const lockHtml = item.password ? '<div class="lock-badge">🔒</div>' : '';
                div.innerHTML = `
                   <div onclick="checkPassAndOpen(${index})">
                   ${lockHtml}
                   <img src="${FOLDER_ICON}">
                   <span>${item.name}</span>
                   </div>
                   <button class="delete-btn" onclick="deleteIcon(${index})">✕</button>
                `;
                container.insertBefore(div, addBtn);
            });
        }

        function addNewIcon() {
            const name = prompt("Nhập tên thư mục:");
            const link = prompt("Dán link Google Drive:");
            // Thêm dòng này để hỏi mật khẩu
            const password = prompt("Đặt mật khẩu (Để trống nếu không cần):");
    
            if (name && link) {
               // Thêm trường password vào object
               shortcuts.push({ name, link, password: password || null });
               saveAndRender();
            }
        }

        function deleteIcon(index) {
            if(confirm("Bạn muốn xóa mục này?")) {
                shortcuts.splice(index, 1);
                saveAndRender();
            }
        }

        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'});
            const date = now.toLocaleDateString('vi-VN');
            document.getElementById('clock').innerHTML = `${time}<br>${date}`;
        }
        function checkPassAndOpen(index) {
            const item = shortcuts[index];
            if (item.password) {
                const inputPass = prompt("Mục này được bảo vệ. Vui lòng nhập mật khẩu:");
                if (inputPass === item.password) {
                   window.open(item.link, '_blank');
                } else if (inputPass !== null) {
                    alert("Sai mật khẩu!");
                }
            } else {
                window.open(item.link, '_blank');
            }
        }
        setInterval(updateClock, 1000);
        updateClock();
        renderIcons();
    </script>
</body>
</html>
