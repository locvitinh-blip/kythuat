<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YenLoc QuickStart - Workspace</title>
    <style>
        :root {
            --text-color: #ffffff;
            --text-shadow: 0px 2px 5px rgba(0, 0, 0, 0.9);
            --font-family: 'Segoe UI', Arial, sans-serif;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: var(--font-family);
            overflow: hidden;
        }

        /* Hình nền */
        .desktop-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* Lưới Icon */
        .desktop-icons {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            grid-template-rows: repeat(auto-fill, 110px);
            gap: 15px;
            padding: 20px;
            height: calc(100vh - 50px);
            align-content: start;
            box-sizing: border-box;
        }

        .icon {
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-color); cursor: pointer; padding: 10px;
            border-radius: 8px; transition: 0.2s; text-decoration: none;
            position: relative;
        }

        .icon:hover {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
        }

        .icon img {
            width: 48px; height: 48px; margin-bottom: 8px;
            filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.5));
        }

        .icon span {
            font-size: 12px; text-shadow: var(--text-shadow);
            text-align: center; font-weight: 500;
        }

        /* Nút xóa icon */
        .delete-btn {
            position: absolute; top: 5px; right: 5px;
            background: rgba(255, 0, 0, 0.7); color: white;
            border: none; border-radius: 50%; width: 18px; height: 18px;
            font-size: 10px; cursor: pointer; display: none;
        }

        .icon:hover .delete-btn { display: block; }

        /* Taskbar */
        .taskbar {
            position: fixed; bottom: 0; width: 100%; height: 48px;
            background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(20px);
            display: flex; align-items: center; padding: 0 15px;
            box-sizing: border-box; z-index: 100;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .taskbar-time { margin-left: auto; color: white; font-size: 12px; text-align: right; }
    </style>
</head>
<body>

    <div class="desktop-background"></div>

    <div class="desktop-icons" id="desktopIcons">
        <div class="icon" onclick="addNewIcon()" id="addBtn">
            <img src="https://cdn-icons-png.flaticon.com/512/1828/1828817.png" alt="Add">
            <span>Thêm Shortcut</span>
        </div>
    </div>

    <div class="taskbar">
        <div style="color: white; font-weight: bold; letter-spacing: 1px;">YENLOC QUICKSTART</div>
        <div id="clock" class="taskbar-time"></div>
    </div>

    <script>
        // 1. Quản lý dữ liệu từ localStorage
        let shortcuts = JSON.parse(localStorage.getItem('myShortcuts')) || [];

        function saveAndRender() {
            localStorage.setItem('myShortcuts', JSON.stringify(shortcuts));
            renderIcons();
        }

        function renderIcons() {
            const container = document.getElementById('desktopIcons');
            const addBtn = document.getElementById('addBtn');
            
            // Xóa hết các icon cũ (trừ nút thêm)
            const oldIcons = container.querySelectorAll('.dynamic-icon');
            oldIcons.forEach(icon => icon.remove());

            // Vẽ lại các icon từ dữ liệu lưu trữ
            shortcuts.forEach((item, index) => {
                const a = document.createElement('div');
                a.className = 'icon dynamic-icon';
                a.innerHTML = `
                    <div onclick="window.open('${item.link}', '_blank')">
                        <img src="https://cdn-icons-png.flaticon.com/512/2965/2965306.png">
                        <span>${item.name}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteIcon(${index})">✕</button>
                `;
                container.insertBefore(a, addBtn);
            });
        }

        // 2. Hàm thêm mới
        function addNewIcon() {
            const name = prompt("Tên thư mục/ứng dụng:");
            const link = prompt("Link Google Drive:");
            
            if (name && link) {
                shortcuts.push({ name, link });
                saveAndRender();
            }
        }

        // 3. Hàm xóa icon
        function deleteIcon(index) {
            if(confirm("Bạn muốn xóa shortcut này?")) {
                shortcuts.splice(index, 1);
                saveAndRender();
            }
        }

        // 4. Đồng hồ
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'});
            const date = now.toLocaleDateString('vi-VN');
            document.getElementById('clock').innerHTML = `${time}<br>${date}`;
        }

        setInterval(updateClock, 1000);
        updateClock();
        renderIcons(); // Chạy lần đầu khi load trang
    </script>
</body>
</html>
