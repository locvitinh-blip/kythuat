<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lộc vi tính - Fix Printer PC</title>
    <style>
        :root {
            --text-color: #ffffff;
            --text-shadow: 0px 2px 5px rgba(0, 0, 0, 0.9);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
        }

        /* Hình nền */
        .desktop-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* Lưới Icon Desktop */
        .desktop-icons {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            grid-template-rows: repeat(auto-fill, 120px);
            gap: 10px;
            padding: 20px;
            height: calc(100vh - 50px);
            align-content: start;
            box-sizing: border-box;
        }

        .icon {
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-color); cursor: pointer; padding: 10px;
            border-radius: 8px; transition: 0.2s; text-decoration: none;
            position: relative;
        }

        .icon:hover {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        .icon img {
            width: 55px;
            height: auto;
            margin-bottom: 8px;
            filter: drop-shadow(0px 4px 5px rgba(0,0,0,0.4));
        }

        .icon span {
            font-size: 13px; text-shadow: var(--text-shadow);
            text-align: center; font-weight: 500;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .delete-btn {
            position: absolute; top: 2px; right: 15px;
            background: rgba(255, 50, 50, 0.9); color: white;
            border: none; border-radius: 50%; width: 20px; height: 20px;
            font-size: 12px; cursor: pointer; display: none; z-index: 10;
        }

        .icon:hover .delete-btn { display: block; }

        .lock-badge {
            position: absolute;
            top: 5px;
            right: 15px;
            font-size: 14px;
            z-index: 5;
        }

        .taskbar {
            position: fixed; bottom: 0; width: 100%; height: 48px;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px);
            display: flex; align-items: center; padding: 0 20px;
            box-sizing: border-box; z-index: 100;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .taskbar-time { margin-left: auto; color: white; font-size: 12px; text-align: right; line-height: 1.3; }
    </style>
</head>
<body>

    <div class="desktop-background"></div>

    <div class="desktop-icons" id="desktopIcons">
        <div class="icon" onclick="addNewIcon()" id="addBtn">
            <img src="https://cdn-icons-png.flaticon.com/512/10543/10543160.png" alt="Add">
            <span>Thêm Shortcut</span>
        </div>
    </div>

    <div class="taskbar">
        <div style="color: white; font-weight: bold; font-size: 14px;">WINDOWS 90 PRO</div>
        <div id="clock" class="taskbar-time"></div>
    </div>

    <script>
        // --- CẤU HÌNH GITHUB ---
        const GITHUB_TOKEN = "ghp_" + "uKQS8YBldGQxwfq4onxsjr8Kf1asQO41kKRc"; 
        const USERNAME = 'locvitinh-blip'; // Thay bằng username GitHub của bạn
        const REPO = 'kythuat'; // Thay bằng tên Repository của bạn
        const FILE_PATH = 'data.json';
        const FOLDER_ICON = "https://cdn-icons-png.flaticon.com/512/3767/3767084.png";

        let shortcuts = [];

        // 1. Tải dữ liệu từ GitHub khi mở trang
        async function loadDataFromGithub() {
            const url = `https://api.github.com/repos/${USERNAME}/${REPO}/contents/${FILE_PATH}`;
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Không thể tải file");
                const data = await response.json();
                // Giải mã Base64 sang UTF-8
                const content = decodeURIComponent(escape(atob(data.content)));
                shortcuts = JSON.parse(content);
                renderIcons();
            } catch (error) {
                console.error("Lỗi:", error);
                // Nếu lỗi, thử lấy từ localStorage làm dự phòng
                shortcuts = JSON.parse(localStorage.getItem('yenloc_data')) || [];
                renderIcons();
            }
        }

        // 2. Ghi dữ liệu lên GitHub
        async function saveDataToGithub() {
            const url = `https://api.github.com/repos/${USERNAME}/${REPO}/contents/${FILE_PATH}`;
            
            try {
                // Lấy SHA của file hiện tại để GitHub cho phép ghi đè
                const getFile = await fetch(url);
                const fileData = await getFile.json();
                const sha = fileData.sha;

                // Mã hóa nội dung sang Base64 hỗ trợ tiếng Việt
                const contentString = JSON.stringify(shortcuts, null, 2);
                const newContent = btoa(unescape(encodeURIComponent(contentString)));

                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: "Update shortcuts data",
                        content: newContent,
                        sha: sha
                    })
                });

                if (response.ok) {
                    console.log("Đã đồng bộ lên GitHub thành công!");
                    // Lưu dự phòng vào localStorage
                    localStorage.setItem('yenloc_data', JSON.stringify(shortcuts));
                    renderIcons();
                } else {
                    alert("Lỗi khi lưu lên GitHub!");
                }
            } catch (error) {
                console.error("Lỗi đồng bộ:", error);
            }
        }

        function renderIcons() {
            const container = document.getElementById('desktopIcons');
            const addBtn = document.getElementById('addBtn');
            const oldIcons = container.querySelectorAll('.dynamic-icon');
            oldIcons.forEach(icon => icon.remove());

            shortcuts.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'icon dynamic-icon';
                const lockHtml = item.password ? '<div class="lock-badge">🔒</div>' : '';
                div.innerHTML = `
                   <div onclick="checkPassAndOpen(${index})">
                       ${lockHtml}
                       <img src="${FOLDER_ICON}">
                       <span>${item.name}</span>
                   </div>
                   <button class="delete-btn" onclick="deleteIcon(${index})">✕</button>
                `;
                container.insertBefore(div, addBtn);
            });
        }

        function addNewIcon() {
            const name = prompt("Nhập tên thư mục:");
            const link = prompt("Dán link Google Drive:");
            const password = prompt("Đặt mật khẩu (Để trống nếu không cần):");
    
            if (name && link) {
               shortcuts.push({ name, link, password: password || null });
               saveDataToGithub(); // Lưu lên GitHub
            }
        }

        // Bạn có thể đổi '1234' thành mật khẩu riêng của bạn
        const DELETE_PASSWORD = "lpc"; 

        async function deleteIcon(index) {
            const item = shortcuts[index];
    
            // Bước 1: Hiện bảng hỏi xác nhận cơ bản
            if (confirm(`Bạn có chắc chắn muốn xóa vĩnh viễn mục "${item.name}" trên GitHub không?`)) {
        
                // Bước 2: Yêu cầu nhập mật khẩu để xác thực quyền xóa
                const confirmPass = prompt("Vui lòng nhập mật khẩu xác nhận để xóa:");
        
                if (confirmPass === DELETE_PASSWORD) {
                    // Nếu đúng mật khẩu, tiến hành xóa trong mảng và đẩy lên GitHub
                    shortcuts.splice(index, 1);
                    await saveDataToGithub(); 
                } else if (confirmPass !== null) {
                    // Thông báo nếu nhập sai mật khẩu
                    alert("Mật khẩu xác nhận xóa không chính xác!");
                }
            }
        }

        function checkPassAndOpen(index) {
            const item = shortcuts[index];
            if (item.password) {
                const inputPass = prompt("Mục này được bảo vệ. Vui lòng nhập mật khẩu:");
                if (inputPass === item.password) {
                   window.open(item.link, '_blank');
                } else if (inputPass !== null) {
                    alert("Sai mật khẩu!");
                }
            } else {
                window.open(item.link, '_blank');
            }
        }

        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'});
            const date = now.toLocaleDateString('vi-VN');
            document.getElementById('clock').innerHTML = `${time}<br>${date}`;
        }

        setInterval(updateClock, 1000);
        updateClock();
        loadDataFromGithub(); // Khởi động bằng cách tải dữ liệu từ GitHub
    </script>
</body>
</html>
